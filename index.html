<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify - Web Player: Music for everyone</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="utility.css" />
    <link
      rel="icon"
      sizes="32x32"
      type="image/png"
      href="https://open.spotifycdn.com/cdn/images/favicon32.b64ecc03.png"
    />
  </head>
  <body>
    <nav>
      <div class="left">
        <div class="logo flex">
          <img class="logo invert svg-size2" src="assets/logo.svg" alt="Logo" />
        </div>
        <button class="home-button svg-size1 backgroung-grey">
          <img class="home invert svg-size3" src="assets/home.svg" alt="Home" />
        </button>
        <div class="search flex backgroung-grey">
          <img
            class="svg-size3 invert"
            src="assets/search.svg"
            alt="Search"
          />What do you want to play?
        </div>
      </div>

      <div class="right"></div>
    </nav>

    <script src="script.js"></script>
  </body>
</html>
