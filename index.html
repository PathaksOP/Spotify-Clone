<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify - Web Player: Music for everyone</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="utility.css" />
    <link rel="stylesheet" href="animations.css" />
    <link
      rel="icon"
      sizes="32x32"
      type="image/png"
      href="https://open.spotifycdn.com/cdn/images/favicon32.b64ecc03.png"
    />
  </head>
  <body>
    <nav>
      <div class="left">
        <div class="logo flex-center">
          <img
            class="logo invert svg-size2"
            src="assets/svg/logo.svg"
            alt="Logo"
          />
        </div>
        <button class="home-button svg-size1 background-grey-2 hover-button">
          <img
            class="home invert svg-size3"
            src="assets/svg/home.svg"
            alt="Home"
          />
        </button>
        <div class="search flex-center background-grey-2">
          <img
            class="svg-size3 invert"
            src="assets/svg/search.svg"
            alt="Search"
          />What do you want to play?
        </div>
      </div>

      <div class="right flex-center">
        <div class="right1 flex-center">
          <div class="flex-center">Premium</div>
          <div class="flex-center">Support</div>
          <div class="flex-center">Download</div>
        </div>
        <div class="right2"></div>
        <div class="right3 flex-center">
          <div class="flex-center install">
            <img
              class="svg-size3 invert"
              src="assets/svg/install.svg"
              alt="Install App"
            />Install App
          </div>
          <div class="flex-center">Sign up</div>
          <button class="flex-center">Log in</button>
        </div>
      </div>
    </nav>
    <!-- <main> -->
    <div class="sidebar backgound-grey-1 flex-column-center-top">
      <div class="sidebar-top flex-space-between">
        <div>Your Library</div>
        <button class="create flex-center background-grey-2">
          <img
            class="svg-size3 invert"
            src="assets/svg/plus.svg"
            alt="Create"
          />Create
        </button>
      </div>
      <div class="song-library flex-column-left-top">
        <!-- <div class="song">Song 1</div> -->
      </div>
    </div>
    <div class="content background-grey-2">
      <div class="playlists">
        <h1>Trending Songs</h1>
        <div class="cardContainer">
          <!-- <div class="card-bg flex-center">
            <div class="card">
              <div class="div-img-main">
                <img
                  src="assets/SongImg/card1.jpg"
                  alt="Humne Wahin Lagaya Dil"
                />
                <div class="flex-center">
                  <img src="assets/svg/play.svg" alt="play" />
                </div>
              </div>

              <h4>Humne Wahin Lagaya Dil (From "Pati Patni Aur Woh Do")</h4>
              <p>Badshah, Devv Sadaana, Kunaal Vermaa, Krish Mondal</p>
            </div>
          </div> -->
        </div>
      </div>
    </div>
    <div class="play-bar">
      <div class="song-info">
        <img
          src="assets/SongImg/Ambient Electronica - Alex Morgan.jpg"
          class="img-size1"
          alt=""
        />

        <div class="song-info-div">
          <div>Now Playing</div>
          <div class="song-info-div-names">
            <div class="song-info-name">Song Name</div>
            <div class="artist-info-name">- Artist Name</div>
          </div>
        </div>
      </div>
      <div class="play-nav">
        <div class="play-buttons">
          <!-- <img class="previous" src="assets/svg/previous.svg" alt="previous" /> -->
          <svg
            class="previous"
            data-encore-id="icon"
            role="img"
            aria-hidden="true"
            class="e-10451-icon"
            viewBox="0 0 16 16"
            style="
              --encore-icon-height: var(
                --encore-graphic-size-decorative-smaller
              );
              --encore-icon-width: var(
                --encore-graphic-size-decorative-smaller
              );
            "
          >
            <path
              fill="rgb(179, 179, 179)"
              d="M3.3 1a.7.7 0 0 1 .7.7v5.15l9.95-5.744a.7.7 0 0 1 1.05.606v12.575a.7.7 0 0 1-1.05.607L4 9.149V14.3a.7.7 0 0 1-.7.7H1.7a.7.7 0 0 1-.7-.7V1.7a.7.7 0 0 1 .7-.7z"
            ></path>
          </svg>
          <div class="play-div flex-center">
            <img class="play" src="assets/svg/playbar-play.svg" alt="play" />
          </div>
          <!-- <img class="next" src="assets/svg/next.svg" alt="next" /> -->
          <svg
            class="next"
            data-encore-id="icon"
            role="img"
            aria-hidden="true"
            class="e-10451-icon"
            viewBox="0 0 16 16"
            style="
              --encore-icon-height: var(
                --encore-graphic-size-decorative-smaller
              );
              --encore-icon-width: var(
                --encore-graphic-size-decorative-smaller
              );
            "
          >
            <path
              fill="rgb(179, 179, 179)"
              d="M12.7 1a.7.7 0 0 0-.7.7v5.15L2.05 1.107A.7.7 0 0 0 1 1.712v12.575a.7.7 0 0 0 1.05.607L12 9.149V14.3a.7.7 0 0 0 .7.7h1.6a.7.7 0 0 0 .7-.7V1.7a.7.7 0 0 0-.7-.7z"
            ></path>
          </svg>
        </div>
        <div class="seekbar-div">
          <div class="current-time">0:00</div>
          <div class="seekbar">
            <div class="circle"></div>
          </div>
          <div class="total-time">1:00</div>
        </div>
      </div>
      <div class="song-controls"></div>
    </div>
    <!-- </main> -->

    <script src="script.js"></script>
  </body>
</html>
